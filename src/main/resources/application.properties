spring.application.name=astrotrack_java

server.port=${PORT:8080}
server.address=0.0.0.0

spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=${ORACLE_DB_URL}
spring.datasource.username=${ORACLE_DB_USERNAME}
spring.datasource.password=${ORACLE_DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.cache.type=simple

astrotrack.jwt.secret=${ASTROTRACK_JWT_SECRET:astrotrack-academic-secret-key-change-before-production-2026}
astrotrack.jwt.expiration-minutes=${ASTROTRACK_JWT_EXPIRATION_MINUTES:120}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
